<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <form id="form-cadastro">
            <h2>Cadastro de Cliente</h2>
            
            <div class="input-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
            </div>

            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="exemplo@email.com" required>
            </div>

            <div class="row">
                <div class="input-group">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00">
                </div>
                <div class="input-group">
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000">
                </div>
            </div>

            <button type="submit">Cadastrar Cliente</button>
        </form>
    </div>

    <div class="container-lista">
        <h3>Clientes Cadastrados</h3>
        <table id="tabela-clientes">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>CPF</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro - Cadastro de Vendas</title>
    <link rel="stylesheet" href="style-financeiro.css">
</head>
<body>

    <div class="container">
        <form id="form-venda">
            <h2>Lançar Nova Venda</h2>
            
            <div class="input-group">
                <label for="cliente">Cliente</label>
                <input type="text" id="cliente" placeholder="Nome do cliente" required>
            </div>

            <div class="input-group">
                <label for="produto">Produto/Serviço</label>
                <input type="text" id="produto" placeholder="O que foi vendido?" required>
            </div>

            <div class="row">
                <div class="input-group">
                    <label for="valor">Valor (R$)</label>
                    <input type="number" id="valor" step="0.01" placeholder="0,00" required>
                </div>
                <div class="input-group">
                    <label for="data">Data</label>
                    <input type="date" id="data" required>
                </div>
            </div>

            <button type="submit">Registrar Venda</button>
        </form>
    </div>

    <div class="container-lista">
        <h3>Histórico de Vendas</h3>
        <table id="tabela-vendas">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Cliente</th>
                    <th>Produto</th>
                    <th>Valor</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>

    <script src="script-financeiro.js"></script>
</body>
</html>
